<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Quiz · DS Interview Prep</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #21262d;
            --text: #c9d1d9;
            --text-muted: #8b949e;
            --white: #e6edf3;
            --green: #4ade80;
            --yellow: #fbbf24;
            --red: #f87171;
            --accent: #60a5fa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Nav */
        nav {
            position: sticky; top: 0; z-index: 200;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 32px; height: 56px;
            background: rgba(13,17,23,0.92); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }
        nav .brand { font-weight: 800; font-size: 1rem; color: var(--white); display: flex; align-items: center; gap: 8px; text-decoration: none; }
        nav .brand span { color: #4ade80; }
        nav .nav-links { display: flex; gap: 4px; }
        nav .nav-links a {
            text-decoration: none; color: var(--text-muted); font-size: 0.78rem;
            padding: 6px 12px; border-radius: 6px; transition: all 0.2s; font-weight: 500;
        }
        nav .nav-links a:hover { background: var(--surface); color: var(--white); }
        nav .nav-links a.active { color: var(--white); background: var(--surface); }
        nav .nav-links a.quiz-link { color: #4ade80; border: 1px solid rgba(74,222,128,0.3); }
        nav .nav-links a.quiz-link:hover { background: rgba(74,222,128,0.1); }

        /* Header */
        .header {
            text-align: center;
            padding: 48px 24px 32px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 8px;
        }

        .header p {
            font-size: 16px;
            color: var(--text-muted);
        }

        /* Filters & Score */
        .controls {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 24px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .filter-btn {
            padding: 8px 18px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            border-color: var(--text-muted);
            color: var(--text);
        }

        .filter-btn.active {
            background: var(--white);
            color: var(--bg);
            border-color: var(--white);
        }

        .score {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .score span {
            color: var(--green);
        }

        /* Quiz Cards */
        .quiz-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 24px 48px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }

        .quiz-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
        }

        .quiz-card.hidden { display: none; }

        .card-tags {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .tag {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tag-sql { background: rgba(96,165,250,0.15); color: #60a5fa; }
        .tag-python { background: rgba(251,191,36,0.15); color: #fbbf24; }
        .tag-ml { background: rgba(192,132,252,0.15); color: #c084fc; }
        .tag-statistics { background: rgba(45,212,191,0.15); color: #2dd4bf; }
        .tag-probability { background: rgba(251,146,60,0.15); color: #fb923c; }
        .tag-casing { background: rgba(74,222,128,0.15); color: #4ade80; }

        .tag-easy { background: rgba(74,222,128,0.15); color: var(--green); }
        .tag-medium { background: rgba(251,191,36,0.15); color: var(--yellow); }
        .tag-hard { background: rgba(248,113,113,0.15); color: var(--red); }

        .question-text {
            font-size: 17px;
            font-weight: 600;
            color: var(--white);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            display: block;
            width: 100%;
            padding: 14px 18px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            line-height: 1.4;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--accent);
            color: var(--white);
        }

        .option-btn:disabled {
            cursor: default;
        }

        .option-btn.correct {
            border-color: var(--green);
            background: rgba(74,222,128,0.12);
            color: var(--green);
        }

        .option-btn.wrong {
            border-color: var(--red);
            background: rgba(248,113,113,0.12);
            color: var(--red);
        }

        .explanation {
            display: none;
            margin-top: 16px;
            padding: 14px 18px;
            background: rgba(96,165,250,0.08);
            border-left: 3px solid var(--accent);
            border-radius: 0 8px 8px 0;
            font-size: 14px;
            color: var(--text);
            line-height: 1.6;
        }

        .explanation.show { display: block; }

        .explanation strong {
            color: var(--accent);
        }

        /* Footer */
        footer {
            margin-top: auto;
            padding: 24px;
            text-align: center;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 14px;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        footer a:hover { color: var(--white); }

        @media (max-width: 600px) {
            .header h1 { font-size: 24px; }
            .quiz-card { padding: 18px; }
            .question-text { font-size: 15px; }
            .option-btn { font-size: 14px; padding: 12px 14px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="brand"><span>&#9670;</span> Claudea's DS Prep</a>
        <div class="nav-links">
            <a href="sql.html">SQL</a>
            <a href="python.html">Python</a>
            <a href="ml.html">ML</a>
            <a href="stats.html">Stats</a>
            <a href="probability.html">Probability</a>
            <a href="casing.html">Casing</a>
            <a href="quiz.html" class="quiz-link active">Quiz</a>
        </div>
    </nav>

    <div class="header">
        <h1>Quick Quiz</h1>
        <p>Test your knowledge across all six topics.</p>
    </div>

    <div class="controls">
        <div class="filters" id="filters">
            <button class="filter-btn active" data-cat="all">All</button>
            <button class="filter-btn" data-cat="sql">SQL</button>
            <button class="filter-btn" data-cat="python">Python</button>
            <button class="filter-btn" data-cat="ml">ML</button>
            <button class="filter-btn" data-cat="statistics">Stats</button>
            <button class="filter-btn" data-cat="probability">Probability</button>
            <button class="filter-btn" data-cat="casing">Casing</button>
        </div>
        <div class="score">Score: <span id="correct">0</span> / <span id="total">0</span></div>
    </div>

    <div class="quiz-container" id="quiz-container"></div>

    <footer>
        Claudea's DS Interview Prep &middot; v02 &middot; <a href="index.html">Back to All Topics</a>
    </footer>

    <script>
        const questions = [
            { cat:"sql", diff:"easy", q:"What does COUNT(*) count?", opts:["Only non-NULL values","All rows including NULLs","Distinct values only","Only NULL values"], ans:1, explain:"COUNT(*) counts all rows regardless of NULL values. COUNT(column) skips NULLs." },
            { cat:"sql", diff:"easy", q:"Which clause filters rows BEFORE grouping?", opts:["HAVING","ORDER BY","WHERE","GROUP BY"], ans:2, explain:"WHERE filters individual rows before any grouping. HAVING filters groups after aggregation." },
            { cat:"sql", diff:"medium", q:"What's the difference between RANK() and DENSE_RANK()?", opts:["RANK() starts at 0, DENSE_RANK() starts at 1","RANK() skips numbers after ties, DENSE_RANK() doesn't","They are identical","DENSE_RANK() only works with PARTITION BY"], ans:1, explain:"With values 100, 90, 90, 80: RANK gives 1,2,2,4 (skips 3). DENSE_RANK gives 1,2,2,3 (no gaps)." },
            { cat:"sql", diff:"medium", q:"Can you use a SELECT alias in the WHERE clause?", opts:["Yes, always","Only in MySQL","No, because WHERE executes before SELECT","Only with subqueries"], ans:2, explain:"SQL execution order: FROM → WHERE → GROUP BY → HAVING → SELECT → ORDER BY. WHERE runs before SELECT, so aliases aren't available yet." },
            { cat:"sql", diff:"hard", q:"Which is generally more efficient for checking existence in a large table?", opts:["IN with subquery","EXISTS with correlated subquery","CROSS JOIN","LEFT JOIN with IS NOT NULL"], ans:1, explain:"EXISTS can short-circuit — it stops once it finds one matching row. IN must evaluate the entire subquery result set." },
            { cat:"python", diff:"easy", q:"What is the time complexity of looking up a key in a Python dict?", opts:["O(n)","O(log n)","O(1) average","O(n log n)"], ans:2, explain:"Python dicts use hash tables. Average-case lookup, insertion, and deletion are all O(1)." },
            { cat:"python", diff:"easy", q:"What does df.groupby('col')['val'].transform('mean') return?", opts:["A single scalar value","A DataFrame with group means","A Series the same length as df with group means","An error"], ans:2, explain:"transform() returns a Series aligned with the original DataFrame, broadcasting the group-level result back to each row." },
            { cat:"python", diff:"medium", q:"Why is def f(x=[]) considered dangerous?", opts:["Lists can't be function arguments","The default list is shared across all calls","It causes a TypeError","Python doesn't support default arguments"], ans:1, explain:"Mutable default arguments are created once when the function is defined. Every call shares the same list object." },
            { cat:"python", diff:"medium", q:"What's the output of: [-1 // 2]?", opts:["0","-1","0.5","-0.5"], ans:1, explain:"Python's floor division (//) rounds toward negative infinity. -1 / 2 = -0.5, floored to -1." },
            { cat:"ml", diff:"easy", q:"Random Forest reduces which type of error compared to a single Decision Tree?", opts:["Bias","Variance","Both equally","Neither"], ans:1, explain:"Random Forest is a bagging ensemble. Averaging many uncorrelated trees reduces variance." },
            { cat:"ml", diff:"medium", q:"When should you use AUC-ROC over accuracy?", opts:["When you have balanced classes","When classes are imbalanced","Only for regression problems","When you need speed"], ans:1, explain:"With imbalanced classes, accuracy is misleading. AUC-ROC evaluates across all thresholds." },
            { cat:"ml", diff:"medium", q:"L1 (Lasso) regularization tends to produce:", opts:["Dense weight vectors","Sparse weight vectors (some weights exactly 0)","Negative weights only","Identical weights for all features"], ans:1, explain:"L1 adds |w| penalty, pushing weights to exactly zero — performing feature selection." },
            { cat:"ml", diff:"hard", q:"What's the main risk of fitting a scaler on the entire dataset before cross-validation?", opts:["Slower training","Data leakage — test fold info leaks into training","No risk, it's best practice","Features won't be normalized"], ans:1, explain:"Test fold statistics influence training transformation, causing data leakage and overly optimistic estimates." },
            { cat:"statistics", diff:"easy", q:"A p-value of 0.03 means:", opts:["3% chance the null hypothesis is true","3% probability of seeing this data (or more extreme) if H0 is true","The effect size is 3%","97% chance the alternative is true"], ans:1, explain:"The p-value is P(data or more extreme | H0 true). It is NOT the probability that H0 is true." },
            { cat:"statistics", diff:"medium", q:"What is a Type II error?", opts:["Rejecting a true null hypothesis","Failing to reject a false null hypothesis","Using the wrong test","Setting alpha too high"], ans:1, explain:"Type I = false positive. Type II = false negative. Power = 1 - P(Type II)." },
            { cat:"statistics", diff:"medium", q:"The Central Limit Theorem states that:", opts:["All data is normally distributed","Sample means approach normal distribution as n increases","Larger samples are always better","Variance increases with sample size"], ans:1, explain:"Regardless of population distribution, sample means become approximately normal as n grows." },
            { cat:"statistics", diff:"hard", q:"In an A/B test, you 'peek' at results daily and stop early when p < 0.05. What happens?", opts:["You get more precise results","Your false positive rate inflates well above 5%","Nothing — p-values are always valid","You reduce Type II error"], ans:1, explain:"Repeated testing inflates Type I error. With daily peeking, false positive rate can exceed 25%." },
            { cat:"probability", diff:"easy", q:"In the Monty Hall problem, should you switch doors?", opts:["No — it's 50/50 after a door opens","Yes — switching gives 2/3 probability","It doesn't matter","Only if the host chooses randomly"], ans:1, explain:"Switching wins 2/3 of the time. Initial pick has 1/3 chance." },
            { cat:"probability", diff:"medium", q:"A test is 99% accurate. Disease prevalence is 1%. If you test positive, what's the approximate probability you're sick?", opts:["99%","50%","1%","90%"], ans:1, explain:"By Bayes' Theorem: P(sick|+) ≈ 50%. Low prevalence drastically reduces positive predictive value." },
            { cat:"probability", diff:"medium", q:"Events A and B are independent. P(A)=0.3, P(B)=0.5. What is P(A and B)?", opts:["0.8","0.15","0.2","0.35"], ans:1, explain:"For independent events, P(A ∩ B) = P(A) × P(B) = 0.3 × 0.5 = 0.15." },
            { cat:"probability", diff:"hard", q:"How many people needed for a >50% chance of a shared birthday?", opts:["50","23","365","183"], ans:1, explain:"With 23 people, C(23,2) = 253 pairs. P(match) > 50%." },
            { cat:"casing", diff:"easy", q:"What is a 'North Star Metric'?", opts:["The highest revenue metric","A single metric that best captures the core value your product delivers","The first metric you track","Customer satisfaction score"], ans:1, explain:"E.g., Airbnb: nights booked, Spotify: time spent listening." },
            { cat:"casing", diff:"medium", q:"'Daily active users dropped 15% last week.' What's the BEST first step?", opts:["Immediately run an A/B test","Check if the metric definition or tracking changed","Build a predictive model","Increase marketing spend"], ans:1, explain:"Verify data correctness first. Tracking bugs are common causes of phantom metric drops." },
            { cat:"casing", diff:"medium", q:"Which metric would be a good GUARDRAIL metric for a test that tries to increase purchase conversion?", opts:["Click-through rate","Revenue per user","Page load time","Cart abandonment rate"], ans:2, explain:"Page load time is a good guardrail — don't break UX while optimizing conversion." },
            { cat:"casing", diff:"hard", q:"A ride-sharing company sees revenue up 20% but rides are down 5%. What's most likely?", opts:["A bug in revenue tracking","Price per ride increased (e.g., surge pricing, route changes)","More drivers joined the platform","Users are taking shorter rides"], ans:1, explain:"Revenue = rides × price per ride. Price per ride increased ~26%." },
        ];

        let correctCount = 0;
        let answeredCount = 0;
        const container = document.getElementById('quiz-container');
        const correctEl = document.getElementById('correct');
        const totalEl = document.getElementById('total');

        function catLabel(cat) {
            const labels = { sql:'SQL', python:'Python', ml:'ML', statistics:'Statistics', probability:'Probability', casing:'Casing' };
            return labels[cat] || cat;
        }

        function renderQuiz() {
            container.innerHTML = '';
            questions.forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = 'quiz-card';
                card.dataset.cat = item.cat;

                let optsHTML = '';
                item.opts.forEach((opt, oi) => {
                    optsHTML += `<button class="option-btn" data-qi="${idx}" data-oi="${oi}">${opt}</button>`;
                });

                card.innerHTML = `
                    <div class="card-tags">
                        <span class="tag tag-${item.cat}">${catLabel(item.cat)}</span>
                        <span class="tag tag-${item.diff}">${item.diff.charAt(0).toUpperCase() + item.diff.slice(1)}</span>
                    </div>
                    <div class="question-text">${item.q}</div>
                    <div class="options">${optsHTML}</div>
                    <div class="explanation" id="explain-${idx}"><strong>Explanation:</strong> ${item.explain}</div>
                `;
                container.appendChild(card);
            });

            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.addEventListener('click', handleAnswer);
            });
        }

        function handleAnswer(e) {
            const btn = e.currentTarget;
            const qi = parseInt(btn.dataset.qi);
            const oi = parseInt(btn.dataset.oi);
            const question = questions[qi];

            const card = btn.closest('.quiz-card');
            const allBtns = card.querySelectorAll('.option-btn');

            allBtns.forEach(b => b.disabled = true);

            const correctIdx = question.ans;
            allBtns[correctIdx].classList.add('correct');

            if (oi === correctIdx) {
                correctCount++;
            } else {
                btn.classList.add('wrong');
            }

            answeredCount++;
            correctEl.textContent = correctCount;
            totalEl.textContent = answeredCount;

            document.getElementById(`explain-${qi}`).classList.add('show');
        }

        // Filtering
        document.getElementById('filters').addEventListener('click', (e) => {
            if (!e.target.classList.contains('filter-btn')) return;

            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');

            const cat = e.target.dataset.cat;
            document.querySelectorAll('.quiz-card').forEach(card => {
                if (cat === 'all' || card.dataset.cat === cat) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });
        });

        renderQuiz();
    </script>

</body>
</html>
