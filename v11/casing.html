<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Case Studies — Test First | DS Prep v11</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}:root{--bg:#0f0f13;--surface:#1a1a22;--surface2:#22222e;--border:#2a2a38;--text:#c8c8d4;--text-muted:#7a7a8e;--heading:#ededf5;--accent:#22d3ee;--accent-glow:rgba(34,211,238,0.15);--green:#34d399;--rose:#f472b6;--amber:#fbbf24}body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    nav{position:sticky;top:0;z-index:200;display:flex;justify-content:space-between;align-items:center;padding:0 32px;height:56px;background:rgba(15,15,19,0.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}nav .brand{font-weight:700;font-size:1rem;color:var(--heading);display:flex;align-items:center;gap:8px;text-decoration:none}nav .brand .logo{width:20px;height:20px;border-radius:6px;background:linear-gradient(135deg,#7c6cf0,#22d3ee)}nav .nav-links{display:flex;gap:2px}nav .nav-links a{text-decoration:none;color:var(--text-muted);font-size:.78rem;padding:6px 12px;border-radius:6px;transition:all .2s;font-weight:500}nav .nav-links a:hover{background:var(--surface);color:var(--heading)}nav .nav-links a.active{color:var(--heading);background:var(--surface2)}
    .page-header{padding:32px 32px 24px;max-width:900px;margin:0 auto}.page-header .top{display:flex;align-items:center;gap:14px;margin-bottom:8px}.page-header .icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;background:var(--accent-glow)}.page-header h1{font-size:2rem;font-weight:700;color:var(--heading)}.page-header p{font-size:.9rem;color:var(--text-muted);margin-left:62px}
    .progress-bar{max-width:900px;margin:0 auto 24px;padding:0 32px}.progress-bar .track{height:6px;border-radius:3px;background:var(--border);overflow:hidden}.progress-bar .fill{height:100%;border-radius:3px;background:var(--accent);width:0%;transition:width .5s ease}.progress-bar .label{display:flex;justify-content:space-between;margin-top:6px;font-size:.72rem;color:var(--text-muted)}
    .container{max-width:900px;margin:0 auto;padding:0 32px 64px}
    .challenge-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:16px;overflow:hidden;transition:all .3s}.challenge-card.completed{border-color:rgba(52,211,153,0.3)}
    .question-section{padding:24px 28px}.question-section .q-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.question-section .q-num{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent)}.question-section .status{font-size:.7rem;font-weight:600;padding:3px 10px;border-radius:12px}.status-locked{background:var(--surface2);color:var(--text-muted)}.status-correct{background:rgba(52,211,153,0.12);color:var(--green)}.status-wrong{background:rgba(244,114,182,0.12);color:var(--rose)}
    .question-section .question{font-size:1rem;font-weight:600;color:var(--heading);margin-bottom:16px;line-height:1.5}.options{display:flex;flex-direction:column;gap:8px}.option{padding:12px 16px;border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .2s;font-size:.87rem;line-height:1.5;background:var(--bg)}.option:hover:not(.disabled){border-color:#3a3a4e;background:var(--surface2)}.option.correct{border-color:var(--green);background:rgba(52,211,153,0.08);color:var(--green)}.option.wrong{border-color:var(--rose);background:rgba(244,114,182,0.08);color:var(--rose)}.option.reveal{border-color:rgba(52,211,153,0.4)}.option.disabled{cursor:default;opacity:.7}
    .cheat-card{border-top:1px solid var(--border);padding:24px 28px;background:var(--surface2);display:none}.cheat-card.unlocked{display:block;animation:slideDown .4s ease}@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}.cheat-card .unlock-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--green);margin-bottom:10px;display:flex;align-items:center;gap:6px}.cheat-card h3{font-size:.95rem;font-weight:700;color:var(--heading);margin-bottom:10px}.cheat-card ul{list-style:none;padding:0}.cheat-card ul li{font-size:.84rem;color:var(--text);padding:3px 0;line-height:1.55}.cheat-card ol{padding-left:20px}.cheat-card ol li{font-size:.84rem;color:var(--text);padding:3px 0;line-height:1.55}.cheat-card p.note{font-size:.8rem;color:var(--text-muted);margin-top:8px;line-height:1.5;font-style:italic}
    .retry-btn{display:none;margin:24px auto;padding:10px 28px;border:1px solid var(--accent);background:var(--accent-glow);color:var(--accent);border-radius:10px;font-family:'Space Grotesk',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s}.retry-btn:hover{background:rgba(34,211,238,0.25)}.retry-btn.show{display:block}
    .confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999}
    footer{text-align:center;padding:32px;font-size:.8rem;color:var(--text-muted);border-top:1px solid var(--border)}footer a{color:#7c6cf0;text-decoration:none}
    @media(max-width:600px){nav{padding:0 16px}nav .nav-links a{font-size:.7rem;padding:5px 8px}.page-header,.progress-bar,.container{padding-left:16px;padding-right:16px}.page-header h1{font-size:1.5rem}}
  </style>
</head>
<body>
  <nav><a href="index.html" class="brand"><div class="logo"></div> DS Prep v11</a><div class="nav-links"><a href="sql.html">SQL</a><a href="python.html">Python</a><a href="ml.html">ML</a><a href="stats.html">Stats</a><a href="probability.html">Probability</a><a href="casing.html" class="active">Casing</a></div></nav>
  <div class="page-header"><div class="top"><div class="icon">&#128161;</div><h1>Case Studies</h1></div><p>Answer each question to unlock its cheat sheet card.</p></div>
  <div class="progress-bar"><div class="track"><div class="fill" id="progress-fill"></div></div><div class="label"><span id="progress-text">0 / 6 unlocked</span><span id="progress-pct">0%</span></div></div>
  <div class="container" id="challenges"></div>
  <button class="retry-btn" id="retry-btn">Retry Missed Questions</button>
  <canvas class="confetti" id="confetti"></canvas>
  <footer><p>Data Science Interview Prep &middot; v11 &middot; <a href="index.html">Back to Topics</a></p></footer>
<script>
const TOPIC='casing';
const challenges=[
  {question:'What is a "North Star Metric"?',options:["The highest metric achieved","A single metric capturing core product value","The first metric ever tracked","A metric that never changes"],correct:1,cardTitle:"Product Metrics Framework",cardHTML:`<ul><li><strong>North Star Metric</strong> — single metric capturing core value</li><li><strong>Acquisition</strong> — new users, sign-ups, installs</li><li><strong>Activation</strong> — first key action (aha moment)</li><li><strong>Retention</strong> — D1, D7, D30 retention rates</li><li><strong>Revenue</strong> — ARPU, LTV, conversion rate</li><li><strong>Referral</strong> — viral coefficient, NPS</li></ul>`},
  {question:"What should be your first step when structuring a case?",options:["Jump to analysis","Clarify — restate the problem and ask questions","Start building a model","Recommend a solution"],correct:1,cardTitle:"Structuring a Case",cardHTML:`<ol><li><strong>Clarify</strong> — restate the problem, ask questions</li><li><strong>Define metrics</strong> — primary + guardrail metrics</li><li><strong>Hypothesize</strong> — state expected cause / direction</li><li><strong>Analyze</strong> — segment data, test hypotheses</li><li><strong>Recommend</strong> — action + expected impact</li><li><strong>Measure</strong> — how to validate the recommendation</li></ol>`},
  {question:'"DAU dropped 15%." Best first step?',options:["Launch a new feature","Check if metric definition or tracking changed","Run an A/B test","Increase marketing spend"],correct:1,cardTitle:"Metric Change Questions",cardHTML:`<p style="font-size:.84rem;margin-bottom:8px;color:var(--text-muted);">"Metric X dropped 10%. What happened?"</p><ol><li><strong>Clarify</strong> — which metric, how measured, timeframe?</li><li><strong>External factors</strong> — seasonality, competitors, market</li><li><strong>Internal factors</strong> — product changes, bugs, deploys</li><li><strong>Segment</strong> — by platform, geo, user cohort, channel</li><li><strong>Quantify</strong> — how much does each factor explain?</li></ol>`},
  {question:"In market sizing, what should you always do with your assumptions?",options:["Hide them","State them clearly","Ignore them","Only use exact numbers"],correct:1,cardTitle:"Market Sizing",cardHTML:`<ul><li><strong>Top-down</strong> — Total market → apply filter rates</li><li><strong>Bottom-up</strong> — Unit economics → scale up</li><li>State assumptions clearly</li><li>Use round numbers for mental math</li><li>Sanity-check your answer</li></ul>`},
  {question:"What's the minimum duration for an A/B test?",options:["1 day","Full weekly cycle","1 hour","Until you see significance"],correct:1,cardTitle:"Experiment Design",cardHTML:`<ul><li><strong>Unit of randomization</strong> — user, session, page?</li><li><strong>Duration</strong> — cover full weekly cycle minimum</li><li><strong>Guardrail metrics</strong> — ensure you don't break things</li><li><strong>Network effects</strong> — may need cluster randomization</li><li><strong>Novelty / primacy effects</strong> — wait for stabilization</li></ul>`},
  {question:"When presenting findings, you should:",options:["Build suspense with details first","Lead with the answer, then evidence","Only share positive results","Avoid quantifying anything"],correct:1,cardTitle:"Communication Tips",cardHTML:`<ul><li><strong>Lead with the answer</strong> — conclusion first, then evidence</li><li><strong>Structure your thoughts</strong> — "I'll break this into 3 parts..."</li><li><strong>Quantify everything</strong> — "~20% of users" not "a lot of users"</li><li><strong>Acknowledge trade-offs</strong> — shows maturity</li><li><strong>Ask clarifying questions</strong> — never assume</li></ul>`}
];
let correctCount=0,answeredCount=0;
function render(){const c=document.getElementById('challenges');c.innerHTML='';challenges.forEach((ch,i)=>{const d=document.createElement('div');d.className='challenge-card';d.id=`challenge-${i}`;d.innerHTML=`<div class="question-section"><div class="q-header"><span class="q-num">Question ${i+1} of ${challenges.length}</span><span class="status status-locked" id="status-${i}">Locked</span></div><div class="question">${ch.question}</div><div class="options" id="options-${i}">${ch.options.map((o,oi)=>`<div class="option" data-qi="${i}" data-oi="${oi}">${o}</div>`).join('')}</div></div><div class="cheat-card" id="card-${i}"><div class="unlock-label">&#9989; Unlocked</div><h3>${ch.cardTitle}</h3>${ch.cardHTML}</div>`;c.appendChild(d)});document.querySelectorAll('.option').forEach(o=>o.addEventListener('click',handleAnswer))}
function handleAnswer(e){const opt=e.currentTarget;if(opt.classList.contains('disabled'))return;const qi=parseInt(opt.dataset.qi),oi=parseInt(opt.dataset.oi),ch=challenges[qi];document.querySelectorAll(`#options-${qi} .option`).forEach(o=>{o.classList.add('disabled');if(parseInt(o.dataset.oi)===ch.correct)o.classList.add('reveal')});answeredCount++;if(oi===ch.correct){opt.classList.add('correct');document.getElementById(`status-${qi}`).className='status status-correct';document.getElementById(`status-${qi}`).textContent='Unlocked';document.getElementById(`card-${qi}`).classList.add('unlocked');document.getElementById(`challenge-${qi}`).classList.add('completed');correctCount++}else{opt.classList.add('wrong');document.getElementById(`status-${qi}`).className='status status-wrong';document.getElementById(`status-${qi}`).textContent='Missed';const cl=document.getElementById(`card-${qi}`);cl.querySelector('.unlock-label').innerHTML='&#128218; Review';cl.querySelector('.unlock-label').style.color='var(--amber)';cl.classList.add('unlocked')}updateProgress();if(answeredCount===challenges.length){saveProgress();if(correctCount<challenges.length)document.getElementById('retry-btn').classList.add('show');else launchConfetti()}}
function updateProgress(){const p=Math.round((correctCount/challenges.length)*100);document.getElementById('progress-fill').style.width=p+'%';document.getElementById('progress-text').textContent=`${correctCount} / ${challenges.length} unlocked`;document.getElementById('progress-pct').textContent=p+'%'}
function saveProgress(){localStorage.setItem(`v11_${TOPIC}`,JSON.stringify({correct:correctCount,total:challenges.length,unlocked:correctCount}));const t=new Date().toDateString();const s=JSON.parse(localStorage.getItem('v11_streak')||'{"count":0,"lastDate":""}');if(s.lastDate!==t){const y=new Date(Date.now()-86400000).toDateString();s.count=(s.lastDate===y)?s.count+1:1;s.lastDate=t;localStorage.setItem('v11_streak',JSON.stringify(s))}}
document.getElementById('retry-btn').addEventListener('click',()=>{correctCount=0;answeredCount=0;document.getElementById('retry-btn').classList.remove('show');render();updateProgress()});
function launchConfetti(){const canvas=document.getElementById('confetti'),ctx=canvas.getContext('2d');canvas.width=innerWidth;canvas.height=innerHeight;const p=[],cols=['#60a5fa','#34d399','#fbbf24','#f472b6','#a78bfa','#22d3ee'];for(let i=0;i<120;i++)p.push({x:Math.random()*canvas.width,y:-20-Math.random()*200,w:6+Math.random()*6,h:4+Math.random()*4,color:cols[Math.floor(Math.random()*cols.length)],vy:2+Math.random()*3,vx:(Math.random()-0.5)*4,rot:Math.random()*360,vr:(Math.random()-0.5)*10,life:1});let f=0;function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);let alive=false;p.forEach(p=>{if(p.life<=0)return;alive=true;p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.vy+=0.05;if(p.y>canvas.height)p.life=0;if(f>60)p.life-=0.015;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore()});f++;if(alive)requestAnimationFrame(draw)}draw()}
render();
</script>
</body>
</html>
