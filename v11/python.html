<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Python — Test First | DS Prep v11</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f0f13; --surface: #1a1a22; --surface2: #22222e;
      --border: #2a2a38; --text: #c8c8d4; --text-muted: #7a7a8e;
      --heading: #ededf5; --accent: #fbbf24; --accent-glow: rgba(251,191,36,0.15);
      --green: #34d399; --rose: #f472b6; --amber: #fbbf24;
    }
    body { font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    nav { position: sticky; top: 0; z-index: 200; display: flex; justify-content: space-between; align-items: center; padding: 0 32px; height: 56px; background: rgba(15,15,19,0.9); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); }
    nav .brand { font-weight: 700; font-size: 1rem; color: var(--heading); display: flex; align-items: center; gap: 8px; text-decoration: none; }
    nav .brand .logo { width: 20px; height: 20px; border-radius: 6px; background: linear-gradient(135deg, #7c6cf0, #22d3ee); }
    nav .nav-links { display: flex; gap: 2px; }
    nav .nav-links a { text-decoration: none; color: var(--text-muted); font-size: 0.78rem; padding: 6px 12px; border-radius: 6px; transition: all 0.2s; font-weight: 500; }
    nav .nav-links a:hover { background: var(--surface); color: var(--heading); }
    nav .nav-links a.active { color: var(--heading); background: var(--surface2); }
    .page-header { padding: 32px 32px 24px; max-width: 900px; margin: 0 auto; }
    .page-header .top { display: flex; align-items: center; gap: 14px; margin-bottom: 8px; }
    .page-header .icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; background: var(--accent-glow); }
    .page-header h1 { font-size: 2rem; font-weight: 700; color: var(--heading); }
    .page-header p { font-size: 0.9rem; color: var(--text-muted); margin-left: 62px; }
    .progress-bar { max-width: 900px; margin: 0 auto 24px; padding: 0 32px; }
    .progress-bar .track { height: 6px; border-radius: 3px; background: var(--border); overflow: hidden; }
    .progress-bar .fill { height: 100%; border-radius: 3px; background: var(--accent); width: 0%; transition: width 0.5s ease; }
    .progress-bar .label { display: flex; justify-content: space-between; margin-top: 6px; font-size: 0.72rem; color: var(--text-muted); }
    .container { max-width: 900px; margin: 0 auto; padding: 0 32px 64px; }
    .challenge-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 16px; overflow: hidden; transition: all 0.3s; }
    .challenge-card.completed { border-color: rgba(52,211,153,0.3); }
    .question-section { padding: 24px 28px; }
    .question-section .q-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .question-section .q-num { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent); }
    .question-section .status { font-size: 0.7rem; font-weight: 600; padding: 3px 10px; border-radius: 12px; }
    .status-locked { background: var(--surface2); color: var(--text-muted); }
    .status-correct { background: rgba(52,211,153,0.12); color: var(--green); }
    .status-wrong { background: rgba(244,114,182,0.12); color: var(--rose); }
    .question-section .question { font-size: 1rem; font-weight: 600; color: var(--heading); margin-bottom: 16px; line-height: 1.5; }
    .options { display: flex; flex-direction: column; gap: 8px; }
    .option { padding: 12px 16px; border: 1px solid var(--border); border-radius: 10px; cursor: pointer; transition: all 0.2s; font-size: 0.87rem; line-height: 1.5; background: var(--bg); }
    .option:hover:not(.disabled) { border-color: #3a3a4e; background: var(--surface2); }
    .option.correct { border-color: var(--green); background: rgba(52,211,153,0.08); color: var(--green); }
    .option.wrong { border-color: var(--rose); background: rgba(244,114,182,0.08); color: var(--rose); }
    .option.reveal { border-color: rgba(52,211,153,0.4); }
    .option.disabled { cursor: default; opacity: 0.7; }
    .cheat-card { border-top: 1px solid var(--border); padding: 24px 28px; background: var(--surface2); display: none; }
    .cheat-card.unlocked { display: block; animation: slideDown 0.4s ease; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    .cheat-card .unlock-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--green); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .cheat-card h3 { font-size: 0.95rem; font-weight: 700; color: var(--heading); margin-bottom: 10px; }
    .cheat-card ul { list-style: none; padding: 0; }
    .cheat-card ul li { font-size: 0.84rem; color: var(--text); padding: 3px 0; line-height: 1.55; }
    .cheat-card p.note { font-size: 0.8rem; color: var(--text-muted); margin-top: 8px; line-height: 1.5; }
    .cheat-card pre { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px; overflow-x: auto; font-family: 'JetBrains Mono', monospace; font-size: 0.76rem; line-height: 1.7; color: var(--text); margin-top: 8px; }
    .kw { color: #ff7b72; } .fn { color: #d2a8ff; } .str { color: #a5d6ff; } .cm { color: #484f58; font-style: italic; } .num { color: #79c0ff; }
    .inline-code { background: rgba(110,118,129,0.15); padding: 2px 6px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 0.76rem; }
    .retry-btn { display: none; margin: 24px auto; padding: 10px 28px; border: 1px solid var(--accent); background: var(--accent-glow); color: var(--accent); border-radius: 10px; font-family: 'Space Grotesk', sans-serif; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .retry-btn:hover { background: rgba(251,191,36,0.25); }
    .retry-btn.show { display: block; }
    .confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
    footer { text-align: center; padding: 32px; font-size: 0.8rem; color: var(--text-muted); border-top: 1px solid var(--border); }
    footer a { color: #7c6cf0; text-decoration: none; }
    @media (max-width: 600px) { nav { padding: 0 16px; } nav .nav-links a { font-size: 0.7rem; padding: 5px 8px; } .page-header, .progress-bar, .container { padding-left: 16px; padding-right: 16px; } .page-header h1 { font-size: 1.5rem; } }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="brand"><div class="logo"></div> DS Prep v11</a>
    <div class="nav-links">
      <a href="sql.html">SQL</a>
      <a href="python.html" class="active">Python</a>
      <a href="ml.html">ML</a>
      <a href="stats.html">Stats</a>
      <a href="probability.html">Probability</a>
      <a href="casing.html">Casing</a>
    </div>
  </nav>
  <div class="page-header">
    <div class="top"><div class="icon">&#128013;</div><h1>Python</h1></div>
    <p>Answer each question to unlock its cheat sheet card.</p>
  </div>
  <div class="progress-bar"><div class="track"><div class="fill" id="progress-fill"></div></div><div class="label"><span id="progress-text">0 / 6 unlocked</span><span id="progress-pct">0%</span></div></div>
  <div class="container" id="challenges"></div>
  <button class="retry-btn" id="retry-btn">Retry Missed Questions</button>
  <canvas class="confetti" id="confetti"></canvas>
  <footer><p>Claudea's DS Interview Prep &middot; v11 &middot; <a href="index.html">Back to Topics</a></p></footer>

<script>
const TOPIC = 'python';
const challenges = [
  {
    question: "What is the average time complexity of a dict lookup in Python?",
    options: ["O(n)", "O(log n)", "O(1)", "O(n log n)"],
    correct: 2,
    cardTitle: "Data Structures Complexity",
    cardHTML: `<ul>
      <li><span class="inline-code">list</span> — append O(1), index O(1), search O(n), insert O(n)</li>
      <li><span class="inline-code">dict</span> — get/set O(1) avg, iteration O(n)</li>
      <li><span class="inline-code">set</span> — add/remove/lookup O(1) avg</li>
      <li><span class="inline-code">deque</span> — append/pop both ends O(1)</li>
      <li><span class="inline-code">heap</span> — push/pop O(log n), min O(1)</li>
    </ul>`
  },
  {
    question: "What does df.groupby('col')['val'].transform('mean') return?",
    options: ["A single scalar", "A reduced DataFrame", "A Series the same length as df with group means", "An error"],
    correct: 2,
    cardTitle: "Pandas Essentials",
    cardHTML: `<pre><span class="cm"># Grouping & aggregation</span>\ndf.<span class="fn">groupby</span>(<span class="str">'col'</span>)[<span class="str">'val'</span>].<span class="fn">agg</span>([<span class="str">'mean'</span>,<span class="str">'sum'</span>])\n\n<span class="cm"># Merging</span>\ndf.<span class="fn">merge</span>(df2, on=<span class="str">'id'</span>, how=<span class="str">'left'</span>)\n\n<span class="cm"># Pivot table</span>\ndf.<span class="fn">pivot_table</span>(values=<span class="str">'rev'</span>, index=<span class="str">'month'</span>, aggfunc=<span class="str">'sum'</span>)</pre>`
  },
  {
    question: "What does np.dot(a, b) compute?",
    options: ["Element-wise multiplication", "Dot product", "Cross product", "Matrix transpose"],
    correct: 1,
    cardTitle: "NumPy Patterns",
    cardHTML: `<pre><span class="kw">import</span> numpy <span class="kw">as</span> np\n\na = np.<span class="fn">array</span>([<span class="num">1</span>,<span class="num">2</span>,<span class="num">3</span>])\nnp.<span class="fn">mean</span>(a) | np.<span class="fn">std</span>(a) | np.<span class="fn">median</span>(a)\nnp.<span class="fn">dot</span>(a, b)           <span class="cm"># dot product</span>\nnp.linalg.<span class="fn">inv</span>(M)      <span class="cm"># matrix inverse</span>\na[a > <span class="num">2</span>]              <span class="cm"># boolean indexing</span></pre>`
  },
  {
    question: "Which pattern is best for counting word frequencies?",
    options: ["Two pointers", "Sliding window", "Counter / defaultdict", "Binary search"],
    correct: 2,
    cardTitle: "Common Coding Patterns",
    cardHTML: `<ul>
      <li><strong>Two pointers</strong> — sorted array problems</li>
      <li><strong>Hash map</strong> — counting, grouping, lookup</li>
      <li><strong>Sliding window</strong> — subarray / substring</li>
      <li><strong>Sorting + greedy</strong> — optimization</li>
      <li><strong>defaultdict / Counter</strong> — frequency counts</li>
    </ul>
    <pre><span class="kw">from</span> collections <span class="kw">import</span> Counter\nc = <span class="fn">Counter</span>(words)\nc.<span class="fn">most_common</span>(<span class="num">10</span>)</pre>`
  },
  {
    question: "What does [x**2 for x in range(4)] produce?",
    options: ["[1, 4, 9, 16]", "[0, 1, 4, 9]", "[0, 2, 4, 6]", "Error"],
    correct: 1,
    cardTitle: "String & List Tricks",
    cardHTML: `<pre><span class="cm"># List comprehension</span>\n[x**<span class="num">2</span> <span class="kw">for</span> x <span class="kw">in</span> <span class="fn">range</span>(<span class="num">10</span>) <span class="kw">if</span> x % <span class="num">2</span> == <span class="num">0</span>]\n\n<span class="cm"># Zip two lists</span>\n<span class="fn">dict</span>(<span class="fn">zip</span>(keys, values))\n\n<span class="cm"># Sort by custom key</span>\n<span class="fn">sorted</span>(data, key=<span class="kw">lambda</span> x: x[<span class="num">1</span>], reverse=<span class="kw">True</span>)</pre>`
  },
  {
    question: "Why is def f(x=[]) dangerous?",
    options: ["Lists can't be defaults", "The default list is shared across all calls", "It causes a syntax error", "It's slow"],
    correct: 1,
    cardTitle: "Gotchas",
    cardHTML: `<ul>
      <li><strong>Mutable defaults</strong> — never use <span class="inline-code">def f(x=[])</span></li>
      <li><strong>Shallow copy</strong> — <span class="inline-code">a = b[:]</span> or <span class="inline-code">copy.deepcopy()</span></li>
      <li><strong>Integer division</strong> — <span class="inline-code">//</span> truncates toward −inf</li>
      <li><strong>is vs ==</strong> — <span class="inline-code">is</span> checks identity, <span class="inline-code">==</span> checks value</li>
    </ul>`
  }
];

let correctCount = 0, answeredCount = 0;
function render() {
  const container = document.getElementById('challenges'); container.innerHTML = '';
  challenges.forEach((c, i) => {
    const div = document.createElement('div'); div.className = 'challenge-card'; div.id = `challenge-${i}`;
    div.innerHTML = `<div class="question-section"><div class="q-header"><span class="q-num">Question ${i+1} of ${challenges.length}</span><span class="status status-locked" id="status-${i}">Locked</span></div><div class="question">${c.question}</div><div class="options" id="options-${i}">${c.options.map((o,oi) => `<div class="option" data-qi="${i}" data-oi="${oi}">${o}</div>`).join('')}</div></div><div class="cheat-card" id="card-${i}"><div class="unlock-label">&#9989; Unlocked</div><h3>${c.cardTitle}</h3>${c.cardHTML}</div>`;
    container.appendChild(div);
  });
  document.querySelectorAll('.option').forEach(o => o.addEventListener('click', handleAnswer));
}
function handleAnswer(e) {
  const opt = e.currentTarget; if (opt.classList.contains('disabled')) return;
  const qi = parseInt(opt.dataset.qi), oi = parseInt(opt.dataset.oi), c = challenges[qi];
  document.querySelectorAll(`#options-${qi} .option`).forEach(o => { o.classList.add('disabled'); if (parseInt(o.dataset.oi) === c.correct) o.classList.add('reveal'); });
  answeredCount++;
  if (oi === c.correct) { opt.classList.add('correct'); document.getElementById(`status-${qi}`).className = 'status status-correct'; document.getElementById(`status-${qi}`).textContent = 'Unlocked'; document.getElementById(`card-${qi}`).classList.add('unlocked'); document.getElementById(`challenge-${qi}`).classList.add('completed'); correctCount++; }
  else { opt.classList.add('wrong'); document.getElementById(`status-${qi}`).className = 'status status-wrong'; document.getElementById(`status-${qi}`).textContent = 'Missed'; const cl = document.getElementById(`card-${qi}`); cl.querySelector('.unlock-label').innerHTML = '&#128218; Review'; cl.querySelector('.unlock-label').style.color = 'var(--amber)'; cl.classList.add('unlocked'); }
  updateProgress();
  if (answeredCount === challenges.length) { saveProgress(); if (correctCount < challenges.length) document.getElementById('retry-btn').classList.add('show'); else launchConfetti(); }
}
function updateProgress() { const pct = Math.round((correctCount/challenges.length)*100); document.getElementById('progress-fill').style.width = pct+'%'; document.getElementById('progress-text').textContent = `${correctCount} / ${challenges.length} unlocked`; document.getElementById('progress-pct').textContent = pct+'%'; }
function saveProgress() { localStorage.setItem(`v11_${TOPIC}`, JSON.stringify({correct:correctCount,total:challenges.length,unlocked:correctCount})); const today = new Date().toDateString(); const streak = JSON.parse(localStorage.getItem('v11_streak')||'{"count":0,"lastDate":""}'); if(streak.lastDate!==today){const y=new Date(Date.now()-86400000).toDateString();streak.count=(streak.lastDate===y)?streak.count+1:1;streak.lastDate=today;localStorage.setItem('v11_streak',JSON.stringify(streak));} }
document.getElementById('retry-btn').addEventListener('click', () => { correctCount=0; answeredCount=0; document.getElementById('retry-btn').classList.remove('show'); render(); updateProgress(); });
function launchConfetti(){const canvas=document.getElementById('confetti'),ctx=canvas.getContext('2d');canvas.width=innerWidth;canvas.height=innerHeight;const p=[],cols=['#60a5fa','#34d399','#fbbf24','#f472b6','#a78bfa','#22d3ee'];for(let i=0;i<120;i++)p.push({x:Math.random()*canvas.width,y:-20-Math.random()*200,w:6+Math.random()*6,h:4+Math.random()*4,color:cols[Math.floor(Math.random()*cols.length)],vy:2+Math.random()*3,vx:(Math.random()-0.5)*4,rot:Math.random()*360,vr:(Math.random()-0.5)*10,life:1});let f=0;function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);let alive=false;p.forEach(p=>{if(p.life<=0)return;alive=true;p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.vy+=0.05;if(p.y>canvas.height)p.life=0;if(f>60)p.life-=0.015;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore()});f++;if(alive)requestAnimationFrame(draw)}draw()}
render();
</script>
</body>
</html>
