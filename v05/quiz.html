<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkpoint Quiz &middot; Data Science Prep</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #131f24;
            --surface: #1b2b32;
            --border: #2a4450;
            --text: #d4e4ea;
            --green: #58cc02;
            --blue: #49c0f8;
            --gold: #ffc800;
            --red: #ff4b4b;
            --purple: #ce82ff;
            --orange: #ff9600;
            --pink: #ff69b4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Bar */
        .top-bar {
            position: sticky; top: 0; z-index: 200;
            display: flex; align-items: center; gap: 16px;
            padding: 12px 24px;
            background: var(--surface);
            border-bottom: 2px solid var(--border);
        }

        .brand {
            text-decoration: none;
            font-weight: 800;
            font-size: 1rem;
            color: var(--green);
            display: flex; align-items: center; gap: 6px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .brand:hover { opacity: 0.85; }
        .brand .owl { font-size: 1.3rem; }

        .hearts {
            display: flex; gap: 4px; align-items: center;
            flex-shrink: 0;
        }
        .heart {
            font-size: 1.2rem;
            transition: opacity 0.4s, transform 0.4s;
        }
        .heart.lost {
            opacity: 0.2;
            transform: scale(0.8);
        }

        .progress-wrap {
            flex: 1;
            display: flex; align-items: center; gap: 10px;
            min-width: 0;
        }
        .progress-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text);
            opacity: 0.7;
            white-space: nowrap;
        }
        .progress-track {
            flex: 1;
            height: 14px;
            background: var(--border);
            border-radius: 7px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--green);
            border-radius: 7px;
            transition: width 0.4s ease;
            width: 0%;
        }

        /* Main quiz area */
        .quiz-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 24px 40px;
            max-width: 620px;
            margin: 0 auto;
            width: 100%;
        }

        /* Category badge */
        .cat-badge {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 5px 14px;
            border-radius: 20px;
            margin-bottom: 20px;
        }
        .cat-sql { background: rgba(73,192,248,0.15); color: var(--blue); }
        .cat-python { background: rgba(255,200,0,0.15); color: var(--gold); }
        .cat-ml { background: rgba(206,130,255,0.15); color: var(--purple); }
        .cat-statistics { background: rgba(88,204,2,0.15); color: var(--green); }
        .cat-probability { background: rgba(255,150,0,0.15); color: var(--orange); }
        .cat-casing { background: rgba(255,105,180,0.15); color: var(--pink); }

        .question-text {
            font-size: 1.35rem;
            font-weight: 800;
            line-height: 1.5;
            text-align: center;
            margin-bottom: 28px;
            color: #fff;
        }

        /* Options */
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            margin-bottom: 24px;
        }

        .option-btn {
            width: 100%;
            text-align: left;
            padding: 16px 20px;
            border-radius: 14px;
            border: 2px solid var(--border);
            border-bottom: 6px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
        }
        .option-btn:hover:not(.locked) {
            border-color: var(--blue);
            background: rgba(73,192,248,0.06);
        }
        .option-btn.selected {
            border-color: var(--blue);
            background: rgba(73,192,248,0.1);
        }
        .option-btn.correct-reveal {
            border-color: var(--green);
            border-bottom-color: var(--green);
            background: rgba(88,204,2,0.15);
            color: #fff;
        }
        .option-btn.wrong-reveal {
            border-color: var(--red);
            border-bottom-color: var(--red);
            background: rgba(255,75,75,0.15);
            color: #fff;
        }
        .option-btn.locked {
            cursor: default;
            pointer-events: none;
        }

        /* Check / Continue button */
        .action-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            border-bottom: 6px solid #46a302;
            background: var(--green);
            color: #fff;
            font-family: 'Nunito', sans-serif;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.15s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .action-btn:disabled {
            background: var(--border);
            border-bottom-color: #1e3540;
            color: rgba(255,255,255,0.3);
            cursor: not-allowed;
        }
        .action-btn:not(:disabled):hover {
            filter: brightness(1.1);
        }
        .action-btn:not(:disabled):active {
            border-bottom-width: 2px;
            transform: translateY(4px);
        }

        /* Feedback banner */
        .feedback-banner {
            display: none;
            width: 100%;
            padding: 16px 20px;
            border-radius: 14px;
            margin-bottom: 16px;
            font-weight: 800;
            font-size: 1.1rem;
        }
        .feedback-banner.show { display: block; }
        .feedback-banner.correct-banner {
            background: rgba(88,204,2,0.15);
            color: var(--green);
            border: 2px solid var(--green);
        }
        .feedback-banner.wrong-banner {
            background: rgba(255,75,75,0.12);
            color: var(--red);
            border: 2px solid var(--red);
        }
        .feedback-banner .xp-text {
            font-size: 0.85rem;
            font-weight: 700;
            margin-top: 4px;
        }
        .feedback-banner .explain-text {
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 8px;
            color: var(--text);
            opacity: 0.85;
            line-height: 1.5;
        }

        /* Game Over / Completion screen */
        .end-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 40px 24px;
            max-width: 480px;
            margin: 0 auto;
            width: 100%;
        }
        .end-screen.show {
            display: flex;
        }
        .end-screen .big-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        .end-screen h2 {
            font-size: 1.8rem;
            font-weight: 900;
            color: #fff;
            margin-bottom: 8px;
        }
        .end-screen .sub-text {
            font-size: 1.1rem;
            color: var(--text);
            opacity: 0.8;
            margin-bottom: 8px;
        }
        .end-screen .xp-earned {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--gold);
            margin-bottom: 24px;
        }
        .end-screen .score-detail {
            font-size: 1rem;
            color: var(--text);
            opacity: 0.7;
            margin-bottom: 24px;
        }
        .end-btn {
            display: inline-block;
            padding: 14px 40px;
            border: none;
            border-radius: 14px;
            border-bottom: 6px solid #46a302;
            background: var(--green);
            color: #fff;
            font-family: 'Nunito', sans-serif;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.15s;
            margin-bottom: 12px;
        }
        .end-btn:hover { filter: brightness(1.1); }
        .end-btn.restart-btn {
            background: var(--blue);
            border-bottom-color: #2e8fbf;
        }

        /* Footer */
        footer {
            margin-top: auto;
            text-align: center;
            padding: 28px 24px;
            font-size: 0.8rem;
            color: var(--text);
            opacity: 0.5;
            border-top: 1px solid var(--border);
        }
        footer a {
            color: var(--green);
            text-decoration: none;
        }
        footer a:hover { text-decoration: underline; }

        /* Responsive */
        @media (max-width: 600px) {
            .top-bar {
                padding: 10px 14px;
                gap: 10px;
                flex-wrap: wrap;
            }
            .brand { font-size: 0.85rem; }
            .brand .label { display: none; }
            .heart { font-size: 1rem; }
            .progress-label { font-size: 0.7rem; }
            .quiz-area { padding: 24px 16px 32px; }
            .question-text { font-size: 1.15rem; }
            .option-btn { padding: 14px 16px; font-size: 0.92rem; }
            .action-btn { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="index.html" class="brand">
            <span class="owl">&#129417;</span>
            <span class="label">Data Science Prep</span>
        </a>
        <div class="hearts" id="hearts">
            <span class="heart">&#10084;&#65039;</span>
            <span class="heart">&#10084;&#65039;</span>
            <span class="heart">&#10084;&#65039;</span>
            <span class="heart">&#10084;&#65039;</span>
            <span class="heart">&#10084;&#65039;</span>
        </div>
        <div class="progress-wrap">
            <span class="progress-label" id="progress-label">1 / 26</span>
            <div class="progress-track">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>
    </div>

    <div class="quiz-area" id="quiz-area">
        <div id="cat-badge" class="cat-badge"></div>
        <div id="question-text" class="question-text"></div>
        <div id="options" class="options"></div>
        <div id="feedback" class="feedback-banner"></div>
        <button id="action-btn" class="action-btn" disabled>Check</button>
    </div>

    <div class="end-screen" id="end-screen"></div>

    <footer>
        Data Science Interview Prep &middot; v05 &middot; <a href="../index.html">Back to Gallery</a>
    </footer>

    <script>
        const allQuestions = [
            { cat:"sql", q:"What does COUNT(*) count?", opts:["Only non-NULL values","All rows including NULLs","Distinct values only","Only NULL values"], ans:1, explain:"COUNT(*) counts all rows regardless of NULL values. COUNT(column) skips NULLs." },
            { cat:"sql", q:"Which clause filters rows BEFORE grouping?", opts:["HAVING","ORDER BY","WHERE","GROUP BY"], ans:2, explain:"WHERE filters individual rows before any grouping. HAVING filters groups after aggregation." },
            { cat:"sql", q:"What\u2019s the difference between RANK() and DENSE_RANK()?", opts:["RANK() starts at 0, DENSE_RANK() starts at 1","RANK() skips numbers after ties, DENSE_RANK() doesn\u2019t","They are identical","DENSE_RANK() only works with PARTITION BY"], ans:1, explain:"With values 100, 90, 90, 80: RANK gives 1,2,2,4 (skips 3). DENSE_RANK gives 1,2,2,3 (no gaps)." },
            { cat:"sql", q:"Can you use a SELECT alias in the WHERE clause?", opts:["Yes, always","Only in MySQL","No, because WHERE executes before SELECT","Only with subqueries"], ans:2, explain:"SQL execution order: FROM \u2192 WHERE \u2192 GROUP BY \u2192 HAVING \u2192 SELECT \u2192 ORDER BY. WHERE runs before SELECT, so aliases aren\u2019t available yet." },
            { cat:"sql", q:"Which is generally more efficient for checking existence in a large table?", opts:["IN with subquery","EXISTS with correlated subquery","CROSS JOIN","LEFT JOIN with IS NOT NULL"], ans:1, explain:"EXISTS can short-circuit \u2014 it stops once it finds one matching row. IN must evaluate the entire subquery result set." },
            { cat:"python", q:"What is the time complexity of looking up a key in a Python dict?", opts:["O(n)","O(log n)","O(1) average","O(n log n)"], ans:2, explain:"Python dicts use hash tables. Average-case lookup, insertion, and deletion are all O(1)." },
            { cat:"python", q:"What does df.groupby('col')['val'].transform('mean') return?", opts:["A single scalar value","A DataFrame with group means","A Series the same length as df with group means","An error"], ans:2, explain:"transform() returns a Series aligned with the original DataFrame, broadcasting the group-level result back to each row." },
            { cat:"python", q:"Why is def f(x=[]) considered dangerous?", opts:["Lists can\u2019t be function arguments","The default list is shared across all calls","It causes a TypeError","Python doesn\u2019t support default arguments"], ans:1, explain:"Mutable default arguments are created once when the function is defined. Every call shares the same list object." },
            { cat:"python", q:"What\u2019s the output of: [-1 // 2]?", opts:["0","-1","0.5","-0.5"], ans:1, explain:"Python\u2019s floor division (//) rounds toward negative infinity. -1 / 2 = -0.5, floored to -1." },
            { cat:"python", q:"What is the GIL in Python?", opts:["A garbage collection algorithm","A global lock that allows only one thread to execute Python bytecode at a time","A type of generator","A package installer"], ans:1, explain:"The Global Interpreter Lock prevents true parallelism with threads in CPython. Use multiprocessing for CPU-bound tasks." },
            { cat:"ml", q:"Random Forest reduces which type of error compared to a single Decision Tree?", opts:["Bias","Variance","Both equally","Neither"], ans:1, explain:"Random Forest is a bagging ensemble. Averaging many uncorrelated trees reduces variance." },
            { cat:"ml", q:"When should you use AUC-ROC over accuracy?", opts:["When you have balanced classes","When classes are imbalanced","Only for regression problems","When you need speed"], ans:1, explain:"With imbalanced classes, accuracy is misleading. AUC-ROC evaluates across all thresholds." },
            { cat:"ml", q:"L1 (Lasso) regularization tends to produce:", opts:["Dense weight vectors","Sparse weight vectors (some weights exactly 0)","Negative weights only","Identical weights for all features"], ans:1, explain:"L1 adds |w| penalty, pushing weights to exactly zero \u2014 performing feature selection." },
            { cat:"ml", q:"What\u2019s the main risk of fitting a scaler on the entire dataset before cross-validation?", opts:["Slower training","Data leakage \u2014 test fold info leaks into training","No risk, it\u2019s best practice","Features won\u2019t be normalized"], ans:1, explain:"Test fold statistics influence training transformation, causing data leakage and overly optimistic estimates." },
            { cat:"statistics", q:"A p-value of 0.03 means:", opts:["3% chance the null hypothesis is true","3% probability of seeing this data (or more extreme) if H0 is true","The effect size is 3%","97% chance the alternative is true"], ans:1, explain:"The p-value is P(data or more extreme | H0 true). It is NOT the probability that H0 is true." },
            { cat:"statistics", q:"What is a Type II error?", opts:["Rejecting a true null hypothesis","Failing to reject a false null hypothesis","Using the wrong test","Setting alpha too high"], ans:1, explain:"Type I = false positive. Type II = false negative. Power = 1 - P(Type II)." },
            { cat:"statistics", q:"The Central Limit Theorem states that:", opts:["All data is normally distributed","Sample means approach normal distribution as n increases","Larger samples are always better","Variance increases with sample size"], ans:1, explain:"Regardless of population distribution, sample means become approximately normal as n grows." },
            { cat:"statistics", q:"In an A/B test, you \u2018peek\u2019 at results daily and stop early when p < 0.05. What happens?", opts:["You get more precise results","Your false positive rate inflates well above 5%","Nothing \u2014 p-values are always valid","You reduce Type II error"], ans:1, explain:"Repeated testing inflates Type I error. With daily peeking, false positive rate can exceed 25%." },
            { cat:"probability", q:"In the Monty Hall problem, should you switch doors?", opts:["No \u2014 it\u2019s 50/50 after a door opens","Yes \u2014 switching gives 2/3 probability","It doesn\u2019t matter","Only if the host chooses randomly"], ans:1, explain:"Switching wins 2/3 of the time. Initial pick has 1/3 chance." },
            { cat:"probability", q:"A test is 99% accurate. Disease prevalence is 1%. If you test positive, what\u2019s the approximate probability you\u2019re sick?", opts:["99%","50%","1%","90%"], ans:1, explain:"By Bayes\u2019 Theorem: P(sick|+) \u2248 50%. Low prevalence drastically reduces positive predictive value." },
            { cat:"probability", q:"Events A and B are independent. P(A)=0.3, P(B)=0.5. What is P(A and B)?", opts:["0.8","0.15","0.2","0.35"], ans:1, explain:"For independent events, P(A \u2229 B) = P(A) \u00d7 P(B) = 0.3 \u00d7 0.5 = 0.15." },
            { cat:"probability", q:"How many people needed for a >50% chance of a shared birthday?", opts:["50","23","365","183"], ans:1, explain:"With 23 people, C(23,2) = 253 pairs. P(match) > 50%." },
            { cat:"casing", q:"What is a \u2018North Star Metric\u2019?", opts:["The highest revenue metric","A single metric that best captures the core value your product delivers","The first metric you track","Customer satisfaction score"], ans:1, explain:"E.g., Airbnb: nights booked, Spotify: time spent listening." },
            { cat:"casing", q:"\u2018Daily active users dropped 15% last week.\u2019 What\u2019s the BEST first step?", opts:["Immediately run an A/B test","Check if the metric definition or tracking changed","Build a predictive model","Increase marketing spend"], ans:1, explain:"Verify data correctness first. Tracking bugs are common causes of phantom metric drops." },
            { cat:"casing", q:"Which metric would be a good GUARDRAIL metric for a test that tries to increase purchase conversion?", opts:["Click-through rate","Revenue per user","Page load time","Cart abandonment rate"], ans:2, explain:"Page load time is a good guardrail \u2014 don\u2019t break UX while optimizing conversion." },
            { cat:"casing", q:"A ride-sharing company sees revenue up 20% but rides are down 5%. What\u2019s most likely?", opts:["A bug in revenue tracking","Price per ride increased (e.g., surge pricing, route changes)","More drivers joined the platform","Users are taking shorter rides"], ans:1, explain:"Revenue = rides \u00d7 price per ride. Price per ride increased ~26%." },
        ];

        // Unit mapping: 0=SQL, 1=Python, 2=ML, 3=Statistics, 4=Probability, 5=Casing
        const unitMap = { 0:'sql', 1:'python', 2:'ml', 3:'statistics', 4:'probability', 5:'casing' };
        const catLabels = { sql:'SQL', python:'Python', ml:'ML', statistics:'Statistics', probability:'Probability', casing:'Casing' };

        // Filter by ?unit= param
        const params = new URLSearchParams(window.location.search);
        const unitParam = params.get('unit');
        let questions = allQuestions;
        if (unitParam !== null && unitMap[unitParam] !== undefined) {
            const filterCat = unitMap[unitParam];
            questions = allQuestions.filter(q => q.cat === filterCat);
        }

        const XP_PER_CORRECT = 50;
        let currentIdx = 0;
        let selectedOption = null;
        let checked = false;
        let hearts = 5;
        let score = 0;
        let totalXP = 0;
        let gameOver = false;

        const quizArea = document.getElementById('quiz-area');
        const endScreen = document.getElementById('end-screen');
        const catBadge = document.getElementById('cat-badge');
        const questionText = document.getElementById('question-text');
        const optionsDiv = document.getElementById('options');
        const feedback = document.getElementById('feedback');
        const actionBtn = document.getElementById('action-btn');
        const progressLabel = document.getElementById('progress-label');
        const progressFill = document.getElementById('progress-fill');
        const heartsContainer = document.getElementById('hearts');

        function updateProgress() {
            progressLabel.textContent = (currentIdx + 1) + ' / ' + questions.length;
            progressFill.style.width = ((currentIdx / questions.length) * 100) + '%';
        }

        function updateHearts() {
            const heartEls = heartsContainer.querySelectorAll('.heart');
            heartEls.forEach((el, i) => {
                if (i >= hearts) {
                    el.classList.add('lost');
                } else {
                    el.classList.remove('lost');
                }
            });
        }

        function renderQuestion() {
            if (currentIdx >= questions.length) {
                showCompletion();
                return;
            }

            const q = questions[currentIdx];
            selectedOption = null;
            checked = false;

            // Category badge
            catBadge.className = 'cat-badge cat-' + q.cat;
            catBadge.textContent = catLabels[q.cat];

            // Question
            questionText.textContent = q.q;

            // Options
            optionsDiv.innerHTML = '';
            q.opts.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.dataset.idx = i;
                btn.addEventListener('click', () => selectOption(i, btn));
                optionsDiv.appendChild(btn);
            });

            // Reset feedback
            feedback.className = 'feedback-banner';
            feedback.innerHTML = '';

            // Reset action button
            actionBtn.textContent = 'Check';
            actionBtn.disabled = true;

            updateProgress();
        }

        function selectOption(idx, btn) {
            if (checked) return;
            selectedOption = idx;
            optionsDiv.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            actionBtn.disabled = false;
        }

        actionBtn.addEventListener('click', () => {
            if (checked) {
                // Continue to next
                currentIdx++;
                renderQuestion();
            } else {
                // Check answer
                checkAnswer();
            }
        });

        function checkAnswer() {
            if (selectedOption === null) return;
            checked = true;

            const q = questions[currentIdx];
            const btns = optionsDiv.querySelectorAll('.option-btn');
            btns.forEach(b => b.classList.add('locked'));

            const isCorrect = selectedOption === q.ans;

            // Highlight correct
            btns[q.ans].classList.add('correct-reveal');

            if (isCorrect) {
                score++;
                totalXP += XP_PER_CORRECT;
                feedback.className = 'feedback-banner correct-banner show';
                feedback.innerHTML = '<div>Correct!</div><div class="xp-text">+' + XP_PER_CORRECT + ' XP</div>';
            } else {
                btns[selectedOption].classList.add('wrong-reveal');
                hearts--;
                updateHearts();
                feedback.className = 'feedback-banner wrong-banner show';
                feedback.innerHTML = '<div>Incorrect</div><div class="explain-text">' + q.explain + '</div>';
            }

            if (hearts <= 0) {
                actionBtn.textContent = 'Continue';
                actionBtn.disabled = false;
                setTimeout(() => showGameOver(), 800);
                return;
            }

            actionBtn.textContent = 'Continue';
            actionBtn.disabled = false;
        }

        function showGameOver() {
            gameOver = true;
            quizArea.style.display = 'none';
            endScreen.innerHTML =
                '<div class="big-icon">&#128148;</div>' +
                '<h2>Game Over</h2>' +
                '<div class="sub-text">You ran out of hearts!</div>' +
                '<div class="score-detail">Score: ' + score + ' / ' + questions.length + ' &middot; XP earned: ' + totalXP + '</div>' +
                '<button class="end-btn restart-btn" onclick="restartQuiz()">Try Again</button>' +
                '<a href="index.html" class="end-btn" style="background:var(--surface);border-bottom-color:var(--border);">Return to Path</a>';
            endScreen.classList.add('show');
            saveProgress();
        }

        function showCompletion() {
            quizArea.style.display = 'none';
            progressFill.style.width = '100%';
            const pct = Math.round((score / questions.length) * 100);

            let icon = '&#127942;';
            let title = 'Amazing!';
            if (pct < 50) { icon = '&#128170;'; title = 'Keep Practicing!'; }
            else if (pct < 80) { icon = '&#11088;'; title = 'Great Job!'; }
            else if (pct < 100) { icon = '&#127942;'; title = 'Excellent!'; }
            else { icon = '&#128081;'; title = 'Perfect Score!'; }

            endScreen.innerHTML =
                '<div class="big-icon">' + icon + '</div>' +
                '<h2>' + title + '</h2>' +
                '<div class="sub-text">You scored ' + score + ' / ' + questions.length + ' (' + pct + '%)</div>' +
                '<div class="xp-earned">+' + totalXP + ' XP</div>' +
                '<a href="index.html" class="end-btn">Return to Path</a>';
            endScreen.classList.add('show');
            saveProgress();
        }

        function saveProgress() {
            try {
                const existing = JSON.parse(localStorage.getItem('ds-v05-progress') || '{}');
                existing.lastQuizXP = totalXP;
                existing.lastQuizScore = score;
                existing.lastQuizTotal = questions.length;
                existing.totalXP = (existing.totalXP || 0) + totalXP;
                existing.lastPlayed = new Date().toISOString();
                localStorage.setItem('ds-v05-progress', JSON.stringify(existing));
            } catch(e) {}
        }

        function restartQuiz() {
            currentIdx = 0;
            selectedOption = null;
            checked = false;
            hearts = 5;
            score = 0;
            totalXP = 0;
            gameOver = false;
            updateHearts();
            endScreen.classList.remove('show');
            endScreen.innerHTML = '';
            quizArea.style.display = '';
            renderQuestion();
        }

        // Init
        updateHearts();
        renderQuestion();
    </script>

</body>
</html>
