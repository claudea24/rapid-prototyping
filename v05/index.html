<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Science Interview Prep — Learning Path</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <a href="index.html" class="brand"><span class="owl">&#129417;</span> Data Science Prep</a>
  <div class="stats">
    <div class="stat stat-streak"><span class="s-icon">&#128293;</span> <span id="streakNum">0</span></div>
    <div class="stat stat-xp"><span class="s-icon">&#9733;</span> <span id="xpNum">0</span> XP</div>
    <div class="stat stat-hearts"><span class="s-icon">&#10084;</span> <span id="heartsNum">5</span></div>
  </div>
</div>

<!-- Learning Path -->
<div class="path-container" id="pathContainer"></div>

<div class="continue-banner">
  <a href="#" id="continueBtn">Continue</a>
  <div class="sub" id="continueSub">Start your first lesson</div>
</div>

<footer>
  <p>Data Science Interview Prep &middot; v05 &middot; <a href="../index.html">Back to Gallery</a></p>
</footer>

<script>
const units = [
  {
    name: "SQL", desc: "Queries & Joins",
    lessons: [
      { id: "sql-1", icon: "&#128450;", label: "Query Basics", page: "sql.html#lesson-1" },
      { id: "sql-2", icon: "&#128279;", label: "JOIN Types", page: "sql.html#lesson-2" },
      { id: "sql-3", icon: "&#128200;", label: "Window Fns", page: "sql.html#lesson-3" },
    ]
  },
  {
    name: "Python", desc: "Data & Algorithms",
    lessons: [
      { id: "py-1", icon: "&#128013;", label: "Structures", page: "python.html#lesson-1" },
      { id: "py-2", icon: "&#128060;", label: "Pandas", page: "python.html#lesson-2" },
      { id: "py-3", icon: "&#128187;", label: "Patterns", page: "python.html#lesson-3" },
    ]
  },
  {
    name: "Machine Learning", desc: "Models & Metrics",
    lessons: [
      { id: "ml-1", icon: "&#129302;", label: "Supervised", page: "ml.html#lesson-1" },
      { id: "ml-2", icon: "&#128300;", label: "Unsupervised", page: "ml.html#lesson-2" },
      { id: "ml-3", icon: "&#127919;", label: "Evaluation", page: "ml.html#lesson-3" },
    ]
  },
  {
    name: "Statistics", desc: "Tests & Experiments",
    lessons: [
      { id: "stat-1", icon: "&#128202;", label: "Descriptive", page: "stats.html#lesson-1" },
      { id: "stat-2", icon: "&#9878;", label: "Hypothesis", page: "stats.html#lesson-2" },
      { id: "stat-3", icon: "&#128300;", label: "A/B Testing", page: "stats.html#lesson-3" },
    ]
  },
  {
    name: "Probability", desc: "Bayes & Distributions",
    lessons: [
      { id: "prob-1", icon: "&#127922;", label: "Fundamentals", page: "probability.html#lesson-1" },
      { id: "prob-2", icon: "&#128208;", label: "Distributions", page: "probability.html#lesson-2" },
      { id: "prob-3", icon: "&#129504;", label: "Bayes", page: "probability.html#lesson-3" },
    ]
  },
  {
    name: "Case Studies", desc: "Product & Business",
    lessons: [
      { id: "case-1", icon: "&#128640;", label: "Metrics", page: "casing.html#lesson-1" },
      { id: "case-2", icon: "&#128188;", label: "Frameworks", page: "casing.html#lesson-2" },
      { id: "case-3", icon: "&#128161;", label: "Practice", page: "casing.html#lesson-3" },
    ]
  },
];

// Load progress
function getProgress() {
  const saved = localStorage.getItem('ds-v05-progress');
  return saved ? JSON.parse(saved) : { completed: [], xp: 0, streak: 0, hearts: 5 };
}
function saveProgress(p) { localStorage.setItem('ds-v05-progress', JSON.stringify(p)); }

const progress = getProgress();
document.getElementById('streakNum').textContent = progress.streak;
document.getElementById('xpNum').textContent = progress.xp;
document.getElementById('heartsNum').textContent = progress.hearts;

// Build all lesson IDs in order
const allLessons = [];
units.forEach(u => u.lessons.forEach(l => allLessons.push(l)));

// Find current lesson
function getCurrentIndex() {
  for (let i = 0; i < allLessons.length; i++) {
    if (!progress.completed.includes(allLessons[i].id)) return i;
  }
  return allLessons.length; // all done
}

const currentIdx = getCurrentIndex();
const positions = ['center', 'right', 'center', 'left']; // zigzag

// Render path
const container = document.getElementById('pathContainer');
let lessonGlobal = 0;

units.forEach((unit, uIdx) => {
  // Unit header
  const header = document.createElement('div');
  header.className = 'unit-header';
  header.innerHTML = `
    <div class="unit-num">Unit ${uIdx + 1}</div>
    <h2>${unit.name}</h2>
    <p>${unit.desc}</p>
  `;
  container.appendChild(header);

  // Lessons
  const segment = document.createElement('div');
  segment.className = 'path-segment';

  unit.lessons.forEach((lesson, lIdx) => {
    // Connector
    if (lIdx > 0 || uIdx > 0) {
      const conn = document.createElement('div');
      conn.className = 'connector' + (progress.completed.includes(lesson.id) || lessonGlobal <= currentIdx ? '' : '');
      if (lessonGlobal <= currentIdx) conn.classList.add('done');
      segment.appendChild(conn);
    }

    // Node row
    const row = document.createElement('div');
    const pos = positions[lessonGlobal % positions.length];
    row.className = 'node-row ' + pos;

    let state = 'locked';
    if (progress.completed.includes(lesson.id)) state = 'completed';
    else if (lessonGlobal === currentIdx) state = 'current';

    const isLink = state !== 'locked';
    const tag = isLink ? 'a' : 'div';
    const node = document.createElement(tag);
    node.className = `node ${state}`;
    if (isLink && lesson.page) node.href = lesson.page;

    let inner = `<span class="node-icon">${lesson.icon}</span>`;
    if (state === 'completed') inner = `<span class="crown">&#128081;</span>` + inner;
    inner += `<span class="node-label">${lesson.label}</span>`;
    node.innerHTML = inner;

    row.appendChild(node);
    segment.appendChild(row);
    lessonGlobal++;
  });

  container.appendChild(segment);

  // Checkpoint after each unit (except last)
  if (uIdx < units.length - 1) {
    const cp = document.createElement('div');
    cp.className = 'checkpoint';
    cp.innerHTML = `
      <div class="cp-icon">&#127942;</div>
      <h3>Checkpoint ${uIdx + 1}</h3>
      <p>Review ${unit.name} before moving on</p>
      <a href="quiz.html?unit=${uIdx}">Take Quiz</a>
    `;
    container.appendChild(cp);
  }
});

// Final checkpoint
const finalCp = document.createElement('div');
finalCp.className = 'checkpoint';
finalCp.innerHTML = `
  <div class="cp-icon">&#127775;</div>
  <h3>Final Challenge</h3>
  <p>All 26 questions across every topic</p>
  <a href="quiz.html">Start Final</a>
`;
container.appendChild(finalCp);

// Continue button
const continueBtn = document.getElementById('continueBtn');
const continueSub = document.getElementById('continueSub');
if (currentIdx < allLessons.length) {
  const next = allLessons[currentIdx];
  continueBtn.href = next.page;
  continueSub.textContent = `Next: ${next.label}`;
} else {
  continueBtn.href = 'quiz.html';
  continueBtn.textContent = 'Final Challenge';
  continueSub.textContent = 'All lessons complete!';
}
</script>

</body>
</html>
