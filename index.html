<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prototyping Gallery — Data Science Interview Prep</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      padding: 56px 32px 32px;
      max-width: 1400px;
      margin: 0 auto;
    }
    header .eyebrow {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #4ade80;
      margin-bottom: 12px;
    }
    header h1 {
      font-size: 2.4rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
    }
    header p {
      margin-top: 10px;
      font-size: 1.05rem;
      color: #777;
      max-width: 700px;
      line-height: 1.6;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 24px;
      padding: 16px 32px 64px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
    }
    .card:hover { transform: translateY(-4px); border-color: #444; }
    .card a { text-decoration: none; color: inherit; display: block; }

    .card .preview {
      width: 100%;
      aspect-ratio: 16 / 10;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .card .preview .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      z-index: 1;
    }
    .card .preview .placeholder .num {
      font-size: 3.2rem;
      font-weight: 900;
      color: #1e1e1e;
      font-variant-numeric: tabular-nums;
    }
    .card .preview .placeholder .label {
      font-size: 0.7rem;
      font-weight: 600;
      color: #333;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .card .preview iframe {
      width: 200%;
      height: 200%;
      transform: scale(0.5);
      transform-origin: top left;
      border: none;
      pointer-events: none;
      position: absolute;
      top: 0;
      left: 0;
    }

    .card .info { padding: 16px 20px; }
    .card .info .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .card .info h2 { font-size: 0.95rem; font-weight: 600; color: #fff; }
    .card .info .version-badge {
      font-size: 0.65rem; font-weight: 700; padding: 3px 10px;
      border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px;
      white-space: nowrap; flex-shrink: 0;
      background: #1a1a2a; color: #60a5fa;
    }
    .card .info p {
      margin-top: 6px;
      font-size: 0.82rem;
      color: #666;
      line-height: 1.45;
    }
    .card .info .changes {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .card .info .changes span {
      font-size: 0.68rem;
      padding: 2px 8px;
      border-radius: 4px;
      background: #1a1a1a;
      color: #888;
    }
    .card .info .changes span.added { background: #0f1a15; color: #4ade80; }
    .card .info .changes span.changed { background: #1a1a0f; color: #fbbf24; }
    .card .info .changes span.removed { background: #1a0f0f; color: #f87171; }

    @media (max-width: 768px) {
      header { padding: 40px 16px 24px; }
      header h1 { font-size: 1.8rem; }
      .gallery { grid-template-columns: 1fr; padding: 8px 16px 48px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="eyebrow">Rapid Prototyping</div>
    <h1>Data Science Interview Prep Guide</h1>
    <p>12 iterations of prototyping a data science interview prep website — covering SQL, Python, Machine Learning, Statistics, Probability, and Case Studies. Watch it evolve from v01 to v12.</p>
  </header>

  <div class="gallery" id="gallery"></div>

  <script>
    const versions = [
      { v: 1,  title: "Bare Bones",                     desc: "Single scrolling page covering all 6 topics (SQL, Python, ML, Stats, Probability, Casing) with cheat sheet cards, sample quiz questions, and minimal content.",  changes: ["+single page","+6 topic sections","+sample quiz","+minimal content"] },
      { v: 2,  title: "Warm Editorial Edition",          desc: "Entirely new mood — warm cream palette with Playfair Display serif headings, terracotta/sage/navy accents. Multi-page layout with topic cards, soft shadows, and a sophisticated magazine-style aesthetic.",  changes: ["~warm light theme","+serif typography","+editorial design","+multi-page layout","+soft shadows"] },
      { v: 3,  title: "RPG Gamified Layout",             desc: "Entirely new design — RPG/game theme with XP bars, skill trees, dungeon-themed topic pages, loot-rarity concept cards, daily quests, and a battle-mode quiz with hearts and streaks.",  changes: ["+RPG theme","+XP system","+skill dungeons","+battle quiz","+daily quests","+localStorage"] },
      { v: 4,  title: "Bloom — Light Pastel Theme",     desc: "Entirely new mood — light pastel palette with rose, lavender, mint accents. Garden metaphor: topics are flowers to grow, quiz is a garden quiz. DM Serif Display headings, soft shadows, feminine aesthetic.",  changes: ["+light theme","+pastel palette","+garden metaphor","+DM Serif font","+study tips"] },
      { v: 5,  title: "Duolingo-Style Path",            desc: "Learning path with checkpoints like Duolingo. Zigzag node map, 3 lessons per topic, chunky green buttons, hearts system, XP tracking, progress saved to localStorage. Continue where you left off.",  changes: ["+learning path","+lesson system","+checkpoints","+hearts","+XP","+continue button"] },
      { v: 6,  title: "Daily Challenge",                desc: "Daily challenge format — one topic per day on a weekly schedule, countdown timer to next challenge, calendar heatmap, streak tracking, timed 5-question quizzes, and a full study guide with tabbed topics.",  changes: ["+daily challenge","+countdown timer","+calendar heatmap","+streak","+weekly schedule","+study guide tabs"] },
      { v: 7,  title: "Textbook Edition",               desc: "Traditional book design — burgundy cover, Libre Baskerville serif, parchment background. Six in-depth chapters with worked examples, key insights, analogies. Practice examination appendix.",  changes: ["+book cover","+6 chapters","+worked examples","+key insights","+exam appendix","+serif typography"] },
      { v: 8,  title: "Interactive Kids Edition",            desc: "Fun, interactive statistics for kids — hypothesis testing coin flips, confidence interval sliders, A/B testing buttons, CLT histograms. Bright colors, animations, simple explanations.",  changes: ["+interactive demos","+kid-friendly UI","+statistics content","+animations"] },
      { v: 9,  title: "Professional Review",            desc: "Interactive pro-level review for experienced DS professionals — advanced SQL, Python data science, probability theory, ML concepts. Clean interface, assessment quiz, focused content.",  changes: ["+professional design","+interactive demos","+assessment quiz","+advanced content"] },
      { v: 10, title: "Spaced Repetition System",       desc: "Intelligent flashcard system with spaced repetition algorithm — review scheduling, progress tracking, mastery analytics, study streaks, and detailed statistics dashboard.",  changes: ["+spaced repetition","+flashcards","+progress tracking","+mastery analytics","+study streaks"] },
      { v: 11, title: "Test-First Learning",             desc: "Quiz-first approach — users test their knowledge with interactive questions before unlocking cheat sheet cards. Tracks mastery per topic with progress rings, streak counter, and confetti on perfect scores.",  changes: ["+quiz-first flow","+unlock cheat sheets","+mastery tracking","+progress rings","+streak counter","+confetti rewards"] },
      { v: 12, title: "Interactive Sandboxes",           desc: "Learn by doing — live SQL editor with in-memory query engine, Python code playground, ML parameter tuner, stats simulator, probability lab with canvas charts, and case study workshop with metric decomposition.",  changes: ["+live SQL sandbox","+Python playground","+ML lab","+stats simulator","+probability lab","+case workshop","+in-memory engines"] },
      { v: 12, title: "Responsive Layout",             desc: "Mobile-first responsive breakpoints — cards stack, code blocks scroll, nav collapses.",        changes: ["~responsive grid","~mobile nav","~code overflow"] },
      { v: 13, title: "Sidebar Navigation",            desc: "Replaced top nav with fixed sidebar on desktop; hamburger menu on mobile.",                    changes: ["~nav → sidebar","+hamburger menu","+section indicators"] },
      { v: 14, title: "Progress Tracking",             desc: "Checkbox-based topic progress with localStorage persistence and progress bar.",                changes: ["+checkboxes","+localStorage","+progress bar"] },
      { v: 15, title: "Search & Filter",               desc: "Global search bar to filter across topics, concepts, and quiz questions.",                     changes: ["+search","+filter by category","+highlight matches"] },
      { v: 16, title: "Quiz Timer Mode",               desc: "Added optional timed quiz mode with countdown and speed-based scoring.",                       changes: ["+timer mode","+speed scoring","~quiz UI"] },
      { v: 17, title: "Tip & Warning Callouts",        desc: "Interview tips, common mistakes, and gotcha callout boxes throughout all sections.",           changes: ["+callout boxes","+interview tips","+warnings"] },
      { v: 18, title: "Print-Friendly Cheat Sheets",   desc: "Print stylesheet for clean, ink-friendly cheat sheet output.",                                changes: ["+print styles","+@media print","~layout for print"] },
      { v: 19, title: "Dark/Light Toggle",             desc: "Theme toggle with smooth CSS transition and preference persistence.",                          changes: ["+light theme","+theme toggle","+localStorage"] },
      { v: 20, title: "Scroll Animations",             desc: "Intersection Observer fade-in and slide-up animations on scroll.",                             changes: ["+scroll animations","+transitions","~visual polish"] },
      { v: 21, title: "Spaced Repetition",             desc: "Quiz uses spaced repetition — missed questions resurface more often.",                         changes: ["+spaced repetition","+question weighting","~quiz logic"] },
      { v: 22, title: "Bookmarks & Notes",             desc: "Let users bookmark cards and add personal notes saved to localStorage.",                       changes: ["+bookmarks","+user notes","+localStorage"] },
      { v: 23, title: "Accessibility Pass",            desc: "ARIA labels, keyboard navigation, focus rings, and WCAG contrast fixes.",                     changes: ["~a11y","+ARIA labels","+focus states","~contrast"] },
      { v: 24, title: "Content QA",                    desc: "All content reviewed for accuracy, code examples tested, links verified.",                     changes: ["~content review","~bug fixes","~code verification"] },
      { v: 25, title: "Launch Ready",                  desc: "Meta tags, Open Graph image, favicon, and final visual polish. Production-ready.",             changes: ["+meta tags","+favicon","+OG image","~final polish"] },
    ];

    const gallery = document.getElementById("gallery");

    versions.forEach(({ v, title, desc, changes }) => {
      const num = String(v).padStart(2, "0");
      const folder = `v${num}`;

      const card = document.createElement("div");
      card.className = "card";

      const changeTags = changes.map(c => {
        let cls = "";
        if (c.startsWith("+")) cls = "added";
        else if (c.startsWith("~")) cls = "changed";
        else if (c.startsWith("-")) cls = "removed";
        return `<span class="${cls}">${c}</span>`;
      }).join("");

      card.innerHTML = `
        <a href="${folder}/index.html">
          <div class="preview" id="preview-${v}">
            <div class="placeholder">
              <span class="num">v${num}</span>
              <span class="label">prototype</span>
            </div>
          </div>
          <div class="info">
            <div class="top-row">
              <h2>v${num} — ${title}</h2>
              <span class="version-badge">v${num}</span>
            </div>
            <p>${desc}</p>
            <div class="changes">${changeTags}</div>
          </div>
        </a>
      `;
      gallery.appendChild(card);

      // Live preview via iframe
      const previewEl = document.getElementById(`preview-${v}`);
      const iframe = document.createElement("iframe");
      iframe.src = `${folder}/index.html`;
      iframe.loading = "lazy";
      iframe.onload = function () {
        const ph = previewEl.querySelector(".placeholder");
        if (ph) ph.style.display = "none";
      };
      iframe.onerror = function () { iframe.remove(); };
      previewEl.appendChild(iframe);
    });
  </script>
</body>
</html>
